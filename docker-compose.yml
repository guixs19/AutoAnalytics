services:
  # Backend API
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
      - ./backend/temp:/app/temp
      - ./backend/outputs:/app/outputs
      - ./backend/.env:/app/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/autoanalytics
    depends_on:
      - db
      - flowise

  # Frontend (nginx para servir arquivos estáticos)
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf

  # Banco de dados PostgreSQL
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autoanalytics
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Flowise (IA)
  flowise:
    image: flowiseai/flowise
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - FLOWISE_USERNAME=admin
      - FLOWISE_PASSWORD=senha_forte
    volumes:
      - flowise_data:/root/.flowise


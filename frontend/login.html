<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoAnalytics - Login</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-4 col-lg-3">
                <!-- Card de Login -->
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-gradient-primary text-white text-center py-4">
                        <i class="fas fa-car fa-3x mb-3"></i>
                        <h1 class="h4 mb-2">
                            <span class="fw-bold">Auto</span><span class="text-warning">Analytics</span>
                        </h1>
                        <p class="small mb-0 opacity-75">Sistema Inteligente para Oficinas</p>
                    </div>
                    
                    <div class="card-body p-4">
                        <!-- Tabs Login/Registro -->
                        <ul class="nav nav-tabs nav-justified mb-4" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" 
                                        data-bs-target="#login" type="button" role="tab">
                                    <i class="fas fa-sign-in-alt me-1"></i> Entrar
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="tab" 
                                        data-bs-target="#register" type="button" role="tab">
                                    <i class="fas fa-user-plus me-1"></i> Registrar
                                </button>
                            </li>
                        </ul>
                        
                        <!-- Conteúdo das Tabs -->
                        <div class="tab-content">
                            <!-- Tab Login -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label for="loginEmail" class="form-label">
                                            <i class="fas fa-envelope me-1"></i> E-mail
                                        </label>
                                        <input type="email" class="form-control" id="loginEmail" 
                                               placeholder="seu@email.com" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label">
                                            <i class="fas fa-lock me-1"></i> Senha
                                        </label>
                                        <input type="password" class="form-control" id="loginPassword" 
                                               placeholder="Sua senha" required>
                                        <div class="form-text text-end">
                                            <a href="#" class="small text-decoration-none">Esqueceu a senha?</a>
                                        </div>
                                    </div>
                                    
                                    <div class="mb-3 form-check">
                                        <input type="checkbox" class="form-check-input" id="rememberMe">
                                        <label class="form-check-label small" for="rememberMe">
                                            Manter conectado
                                        </label>
                                    </div>
                                    
                                    <button type="submit" class="btn btn-primary w-100 py-2">
                                        <i class="fas fa-sign-in-alt me-2"></i>
                                        Entrar
                                    </button>
                                </form>
                            </div>
                            
                            <!-- Tab Registro -->
                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <label for="regName" class="form-label">
                                            <i class="fas fa-user me-1"></i> Nome Completo
                                        </label>
                                        <input type="text" class="form-control" id="regName" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="regEmail" class="form-label">
                                            <i class="fas fa-envelope me-1"></i> E-mail
                                        </label>
                                        <input type="email" class="form-control" id="regEmail" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="regPassword" class="form-label">
                                            <i class="fas fa-lock me-1"></i> Senha
                                        </label>
                                        <input type="password" class="form-control" id="regPassword" 
                                               minlength="6" required>
                                        <div class="form-text">Mínimo 6 caracteres</div>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="regConfirmPassword" class="form-label">
                                            <i class="fas fa-lock me-1"></i> Confirmar Senha
                                        </label>
                                        <input type="password" class="form-control" id="regConfirmPassword" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="regWorkshop" class="form-label">
                                            <i class="fas fa-wrench me-1"></i> Nome da Oficina
                                        </label>
                                        <input type="text" class="form-control" id="regWorkshop" 
                                               placeholder="Ex: Oficina Central" required>
                                    </div>
                                    
                                    <div class="mb-3 form-check">
                                        <input type="checkbox" class="form-check-input" id="terms" required>
                                        <label class="form-check-label small" for="terms">
                                            Aceito os <a href="#" class="text-decoration-none">Termos de Uso</a>
                                        </label>
                                    </div>
                                    
                                    <button type="submit" class="btn btn-success w-100 py-2">
                                        <i class="fas fa-user-plus me-2"></i>
                                        Criar Conta
                                    </button>
                                </form>
                            </div>
                        </div>
                        
                        <!-- Mensagens -->
                        <div id="authMessage" class="mt-3"></div>
                    </div>
                    
                    <div class="card-footer text-center py-3 bg-light">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt me-1"></i>
                            Sistema seguro com autenticação JWT
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript de Autenticação -->
    <script src="js/auth.js"></script>
</body>
</html>
